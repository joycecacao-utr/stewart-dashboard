name: Persona Count Diag (temporary)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run persona count diagnostic
        env:
          VOICEFLOW_KEY: ${{ secrets.VOICEFLOW_KEY }}
        run: node persona-count-diag.js
