name: VF Evals Diagnostic
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run diagnostic
        env:
          VOICEFLOW_KEY: ${{ secrets.VOICEFLOW_KEY }}
        run: node diag-vf-evals.js
