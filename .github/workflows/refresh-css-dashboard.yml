name: Refresh CSS Stats Dashboard

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC = 6:00am PST / 7:00am PDT
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch CSS data
        env:
          FRESHDESK_KEY:           ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:           ${{ secrets.VOICEFLOW_KEY }}
          GOOGLE_SHEETS_API_KEY:   ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          FRESHDESK_DOMAIN:        universaltennis
        run: node fetch-css-data.js

      - name: Build dashboard HTML
        run: node build-css-dashboard.js

      - name: Commit css-stats-dashboard.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp css-stats-dashboard.html /tmp/css-stats-dashboard.html
          for i in 1 2 3 4 5; do
            git fetch origin claude/focused-ptolemy-j6fiib
            git reset --hard origin/claude/focused-ptolemy-j6fiib
            cp /tmp/css-stats-dashboard.html css-stats-dashboard.html
            git add css-stats-dashboard.html
            git diff --staged --quiet && { echo "no changes"; exit 0; }
            git commit -m "chore: refresh CSS dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:claude/focused-ptolemy-j6fiib && exit 0
            echo "push rejected — retrying (attempt $i)…"
            sleep 3
          done
          echo "::error::failed to push after 5 attempts"; exit 1
