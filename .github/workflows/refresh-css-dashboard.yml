name: Refresh CSS Stats Dashboard

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC = 6:00am PST / 7:00am PDT
  workflow_dispatch:         # Manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Fetch CSS data
        env:
          FRESHDESK_KEY:           ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:           ${{ secrets.VOICEFLOW_KEY }}
          GOOGLE_SHEETS_API_KEY:   ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          FRESHDESK_DOMAIN:        universaltennis
          VF_DIAG:                 '1'   # TEMP: dump freshdesk_create_ticket log shape; remove after AI-resolution fix
        run: node fetch-css-data.js

      - name: Build dashboard HTML
        run: node build-css-dashboard.js

      - name: Commit dashboard + data cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp css-stats-dashboard.html /tmp/css-stats-dashboard.html
          cp css-data.json           /tmp/css-data.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/css-stats-dashboard.html css-stats-dashboard.html
            cp /tmp/css-data.json           css-data.json
            git add css-stats-dashboard.html css-data.json
            git diff --staged --quiet && { echo "no changes"; exit 0; }
            git commit -m "chore: refresh CSS dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:main && exit 0
            echo "push rejected — retrying (attempt $i)…"
            sleep 3
          done
          echo "::error::failed to push after 5 attempts"; exit 1
