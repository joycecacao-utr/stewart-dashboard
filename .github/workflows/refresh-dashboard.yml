name: Refresh Stewart Dashboard

on:
  schedule:
    - cron: '0 17 * * *'   # once daily at 17:00 UTC = 9:00am PST (10:00am during PDT; cron can't auto-shift for DST). Manual run available anytime.
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # 60-day pull + rate-limit backoff; fail loudly rather than hang
    permissions:
      contents: write       # needed to commit data.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch dashboard data
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:    ${{ secrets.VOICEFLOW_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node docs/fetch-data.js

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # data.json is a generated artifact — never merge it. On each attempt,
          # reset hard onto the latest main and re-stamp our freshly-built file
          # on top, so a moving main can never cause a rebase conflict.
          cp docs/data.json /tmp/data.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/data.json docs/data.json
            git add docs/data.json
            git diff --staged --quiet && { echo "no changes"; exit 0; }
            git commit -m "chore: refresh dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin HEAD:main && exit 0
            echo "push rejected — retrying onto latest main (attempt $i)…"
            sleep 3
          done
          echo "::error::failed to push data.json after 5 attempts"; exit 1
