name: Refresh Stewart Dashboard

on:
  schedule:
    - cron: '0 6,18 * * *'   # twice daily at 06:00 & 18:00 UTC (60-day pull; manual run available anytime)
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30     # 60-day pull + rate-limit backoff; fail loudly rather than hang
    permissions:
      contents: write       # needed to commit data.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch dashboard data
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:    ${{ secrets.VOICEFLOW_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node docs/fetch-data.js

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet && { echo "no changes"; exit 0; }
          git commit -m "chore: refresh dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Retry with rebase in case another push (e.g. a merge) landed during the run
          for i in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected — rebasing onto latest main (attempt $i)…"
            git pull --rebase origin main || true
            sleep 3
          done
          echo "::error::failed to push data.json after 5 attempts"; exit 1
