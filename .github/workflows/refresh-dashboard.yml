name: Refresh Stewart Dashboard

on:
  schedule:
    - cron: '0 * * * *'   # every hour — change to '*/15 * * * *' for every 15 min
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data.json back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch dashboard data
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:    ${{ secrets.VOICEFLOW_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node --input-type=module < docs/fetch-data.js

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet \
            || git commit -m "chore: refresh dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
