name: PV Batch
on:
  workflow_dispatch:
    inputs:
      months:
        description: 'comma-separated YYYY-MM'
        required: true
jobs:
  pv:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run persona-volume batch
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          FRESHDESK_DOMAIN: universaltennis
          MONTHS:           ${{ inputs.months }}
        run: node diag-persona-volume.js
