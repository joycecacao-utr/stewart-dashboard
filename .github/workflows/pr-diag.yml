name: PR Diag
on:
  workflow_dispatch:
jobs:
  d:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run persona-rules diagnostic
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node diag-persona-rules.js
