name: VF Eval Diag (temporary)

on:
  workflow_dispatch:
    inputs:
      transcript_id:
        description: 'Known evaluated transcript id'
        required: false
        default: 'h6bzr7reaiclwfz4cjxtprv'

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run VF eval diagnostic
        env:
          VOICEFLOW_KEY: ${{ secrets.VOICEFLOW_KEY }}
          DIAG_TID: ${{ github.event.inputs.transcript_id }}
        run: node vf-eval-diag.js
