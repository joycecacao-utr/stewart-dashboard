name: Test Freshchat API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Test Freshchat connection
        env:
          FRESHCHAT_KEY: ${{ secrets.FRESHCHAT_KEY }}
        run: node test-freshchat.js
