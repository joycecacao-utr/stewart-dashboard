name: Diag Ticket Personas
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run ticket-persona diagnostic
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node diag-ticket-personas.js
