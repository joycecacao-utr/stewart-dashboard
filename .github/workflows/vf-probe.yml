name: Probe Voiceflow

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Probe Voiceflow transcripts API
        env:
          VOICEFLOW_KEY: ${{ secrets.VOICEFLOW_KEY }}
        run: node docs/vf-probe.js
