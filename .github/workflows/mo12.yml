name: Mo12
on:
  workflow_dispatch:
jobs:
  d:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run 12-month persona diagnostic
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node diag-persona-12mo.js
