name: Diag Persona Data
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Run persona-data diagnostic
        env:
          FRESHDESK_KEY:    ${{ secrets.FRESHDESK_KEY }}
          VOICEFLOW_KEY:    ${{ secrets.VOICEFLOW_KEY }}
          FRESHDESK_DOMAIN: universaltennis
        run: node diag-persona-data.js
